
<section class="cart-item">
  <img class="item-image" [alt]="item.imgAlt" [src]="'img/background/' + item.imgUrl" />

  <section class="item-details">
    <h3>{{ item.name }}</h3>
    <p class="specs">{{ item.material }} | Acabado: {{ item.finish }} | {{ item.size }}mm</p>
    <p class="capabilities">Ideal para: {{ item.capability }}</p>
  </section>

  <section class="item-actions">
    <span class="price">{{ item.price }} Bs.</span>
    <button class="btn-delete" (click)="cartManager.removeItem(item.name)" title="Eliminar lámina">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ff0000"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
    </button>
  </section>
</section>
