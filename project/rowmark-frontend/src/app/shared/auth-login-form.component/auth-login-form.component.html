<div class="background-img">
  <div class="color-background">
    <article class="auth-container">
      <section class="auth-header">
        <img src="roumark_logo.png" alt="Rowmark Logo" class="logo">
        <h1 class="form-title">Bienvenido a Rowmark</h1>
        <p class="form-description">Inicia sesión para continuar</p>
      </section>

      <section class="form-section">
        <form (ngSubmit)="onSubmit()" class="auth-form">
          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" [(ngModel)]="credentials.email" required>
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" [(ngModel)]="credentials.password" required>
          </div>

          <button type="submit" class="submit-button">Iniciar sesión</button>
        </form>
      </section>
    </article>
  </div>
</div>
